services:
  - type: web
    name: flowforge-api
    env: docker
    dockerfilePath: infra/docker/Dockerfile.api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: flowforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: flowforge-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: worker
    name: flowforge-worker
    env: docker
    dockerfilePath: infra/docker/Dockerfile.worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: flowforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: flowforge-redis
          property: connectionString

databases:
  - name: flowforge-db
    databaseName: flowforge
    plan: starter

redis:
  - name: flowforge-redis
    plan: starter
